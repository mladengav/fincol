name: Auto-assign PR author (if unassigned)

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  assign-author-if-empty:
    runs-on: ubuntu-latest
    steps:
      - name: Assign author only when no assignees exist and author is not a bot
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Skip if already assigned
            if (pr.assignees && pr.assignees.length > 0) {
              core.info(`PR #${pr.number} already has assignee(s); skipping.`);
              return;
            }

            const author = pr.user.login;

            // Skip bot PR authors
            if (author.endsWith('[bot]')) {
              core.info(`PR #${pr.number} author ${author} is a bot; skipping.`);
              return;
            }

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              assignees: [author]
            });

            core.info(`Assigned PR #${pr.number} to ${author}.`);